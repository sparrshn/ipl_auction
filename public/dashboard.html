<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Fantasy Dashboard 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; }
    .score-badge { font-variant-numeric: tabular-nums; }
    .team-row { cursor: pointer; }
    .player-row { display: none; }
    .player-row.open { display: table-row; }
    .chevron { transition: transform 0.2s ease; display: inline-block; }
    .chevron.open { transform: rotate(90deg); }
  </style>
</head>
<body class="min-h-screen text-white font-sans">

  <!-- Header -->
  <header class="bg-slate-800 border-b border-slate-600 px-6 py-4 flex items-center gap-3">
    <span class="text-3xl">🏆</span>
    <div>
      <h1 class="text-2xl font-bold tracking-wide">Cricket Dashboard</h1>
      <p class="text-slate-400 text-sm">IPL Fantasy League 2026</p>
    </div>
  </header>

  <!-- Tab Nav -->
  <nav class="bg-slate-800/60 border-b border-slate-700 px-6">
    <div class="max-w-7xl mx-auto flex gap-1">
      <button id="tab-btn-dashboard" onclick="switchTab('dashboard')" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-white text-white transition-colors">Dashboard</button>
      <button id="tab-btn-compare" onclick="switchTab('compare')" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors">Compare</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">

  <!-- Dashboard Tab -->
  <div id="tab-dashboard">

    <!-- Points Table -->
    <section>
      <div class="flex items-baseline gap-3 mb-4">
        <h2 class="text-xl font-semibold text-slate-200">Points Table</h2>
        <span id="points-table-updated" class="text-xs text-slate-500"></span>
        <span id="points-table-next-update" class="text-xs text-slate-500"></span>
      </div>
      <div id="loading" class="text-slate-400 py-8 text-center">Loading data...</div>
      <div id="error" class="hidden text-red-400 py-8 text-center"></div>

      <div id="table-container" class="hidden overflow-x-auto rounded-xl border border-slate-700">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-800 text-slate-400 uppercase text-xs tracking-wider">
              <th class="px-4 py-3 text-center w-10">#</th>
              <th class="px-4 py-3 text-left cursor-pointer select-none hover:text-slate-200" data-col="name">Team <span class="sort-icon text-slate-600"></span></th>
              <th class="px-4 py-3 text-center cursor-pointer select-none hover:text-slate-200" data-col="match_count">Matches <span class="sort-icon text-slate-600"></span></th>
              <th class="px-4 py-3 text-center cursor-pointer select-none hover:text-slate-200" data-col="batting_runs">Runs <span class="sort-icon text-slate-600"></span></th>
              <th class="px-4 py-3 text-center cursor-pointer select-none hover:text-slate-200" data-col="bowling_wickets">Wickets <span class="sort-icon text-slate-600"></span></th>
              <th class="px-4 py-3 text-center cursor-pointer select-none hover:text-slate-200" data-col="run_pct">Run % <span class="sort-icon text-slate-600"></span></th>
              <th class="px-4 py-3 text-center cursor-pointer select-none hover:text-slate-200" data-col="wicket_pct">Wicket % <span class="sort-icon text-slate-600"></span></th>
              <th class="px-4 py-3 text-center cursor-pointer select-none hover:text-slate-200" data-col="final_score">Score <span class="sort-icon text-slate-600"></span></th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-700/50">
          </tbody>
        </table>
      </div>
    </section>

    <!-- Season Stats -->
    <section class="mt-8">
      <h2 class="text-xl font-semibold text-slate-200 mb-4">Season Stats</h2>
      <div id="season-stats" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </section>

    <!-- Season Bonuses -->
    <section class="mt-8">
      <h2 class="text-xl font-semibold text-slate-200 mb-4">Season Awards</h2>
      <div id="bonuses-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <!-- Match Log -->
    <section class="mt-8">
      <div class="flex items-baseline gap-3 mb-4">
        <h2 class="text-xl font-semibold text-slate-200">Match Log</h2>
        <span id="match-log-updated" class="text-xs text-slate-500"></span>
        <span id="match-log-next-update" class="text-xs text-slate-500"></span>
      </div>
      <div id="upcoming-match" class="mb-4"></div>
      <div id="match-log" class="space-y-3"></div>
      <p id="no-matches" class="hidden text-slate-500 text-sm">No matches recorded yet.</p>
    </section>

  </div><!-- /tab-dashboard -->

  <!-- Compare Tab -->
  <div id="tab-compare" class="hidden">
    <div class="flex flex-wrap items-center gap-4 mb-8">
      <div class="flex items-center gap-3 flex-1 min-w-0">
        <select id="compare-t1" class="flex-1 bg-slate-800 border border-slate-600 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-slate-400">
          <option value="">Select Team 1</option>
        </select>
      </div>
      <span class="text-slate-400 font-bold text-lg shrink-0">vs</span>
      <div class="flex items-center gap-3 flex-1 min-w-0">
        <select id="compare-t2" class="flex-1 bg-slate-800 border border-slate-600 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-slate-400">
          <option value="">Select Team 2</option>
        </select>
      </div>
    </div>
    <div id="compare-output" class="text-slate-400 text-sm text-center py-12">Select two teams to compare.</div>
  </div><!-- /tab-compare -->

  </main>

  <script>
    let sortState = { col: 'final_score', dir: 'desc' };
    let cachedRows = [];
    let cachedTeams = [];

    // ──────────────────────────────────────────────
    // Tab switching
    // ──────────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('tab-dashboard').classList.toggle('hidden', tab !== 'dashboard');
      document.getElementById('tab-compare').classList.toggle('hidden', tab !== 'compare');
      document.getElementById('tab-btn-dashboard').className =
        'tab-btn px-5 py-3 text-sm font-medium border-b-2 transition-colors ' +
        (tab === 'dashboard' ? 'border-white text-white' : 'border-transparent text-slate-400 hover:text-slate-200');
      document.getElementById('tab-btn-compare').className =
        'tab-btn px-5 py-3 text-sm font-medium border-b-2 transition-colors ' +
        (tab === 'compare' ? 'border-white text-white' : 'border-transparent text-slate-400 hover:text-slate-200');
    }

    // ──────────────────────────────────────────────
    // Compare helpers
    // ──────────────────────────────────────────────
    function getCompareMetrics(row) {
      const players = Object.values(row.player_map);
      const matchCount = row.match_count || 1;
      const teamTotal = row.batting_runs + row.bowling_wickets;

      const contributors = players.filter(p => p.adj_batting > 0 || p.adj_bowling > 0).length;

      const topBatter = players.reduce((b, p) => p.adj_batting > (b?.adj_batting || 0) ? p : b, null);
      const topBowler = players.reduce((b, p) => p.adj_bowling > (b?.adj_bowling || 0) ? p : b, null);

      const roles = { Batsmen: 0, 'All-Rounders': 0, Bowlers: 0 };
      const nat = { India: 0, Overseas: 0 };
      players.forEach(p => {
        const s = p.adj_batting + p.adj_bowling;
        if (p.role === 'Batsman' || p.role === 'Wicket-Keeper') roles.Batsmen += s;
        else if (p.role === 'All-Rounder') roles['All-Rounders'] += s;
        else roles.Bowlers += s;
        if (p.nationality === 'India') nat.India += s; else nat.Overseas += s;
      });

      return {
        runsPerMatch: row.batting_runs / matchCount,
        wicketsPerMatch: row.bowling_wickets / matchCount,
        contributors,
        totalSquad: players.length,
        topBatter,
        topBowler,
        roles,
        nat,
        teamTotal
      };
    }

    function pct(val, total) { return total > 0 ? (val / total * 100) : 0; }

    function compBar(v1, v2, color1, color2) {
      const max = Math.max(v1, v2, 0.01);
      const p1 = (v1 / max * 100).toFixed(1);
      const p2 = (v2 / max * 100).toFixed(1);
      return `
        <div class="flex items-center gap-2 mt-1">
          <div class="flex-1 flex justify-end"><div class="h-2 rounded-full" style="width:${p1}%;background:${color1}"></div></div>
          <div class="flex-1"><div class="h-2 rounded-full" style="width:${p2}%;background:${color2}"></div></div>
        </div>`;
    }

    function metricRow(label, v1, v2, color1, color2, fmt = x => x) {
      const isNum = typeof v1 === 'number';
      return `
        <div class="py-3 border-b border-slate-700/50">
          <div class="flex items-center">
            <div class="flex-1 text-right font-semibold text-sm" style="color:${color1}">${fmt(v1)}</div>
            <div class="w-40 text-center text-xs text-slate-500 uppercase tracking-wide px-3">${label}</div>
            <div class="flex-1 text-left font-semibold text-sm" style="color:${color2}">${fmt(v2)}</div>
          </div>
          ${isNum ? compBar(v1, v2, color1, color2) : ''}
        </div>`;
    }

    function pctBar(label, pct1, pct2, color1, color2) {
      return `
        <div class="py-2">
          <div class="flex items-center mb-1">
            <div class="flex-1 text-right text-xs font-medium pr-3" style="color:${color1}">${pct1.toFixed(1)}%</div>
            <div class="w-40 text-center text-xs text-slate-500">${label}</div>
            <div class="flex-1 text-left text-xs font-medium pl-3" style="color:${color2}">${pct2.toFixed(1)}%</div>
          </div>
          <div class="flex gap-2 items-center">
            <div class="flex-1 flex justify-end">
              <div class="h-2 rounded-full transition-all" style="width:${pct1.toFixed(1)}%;background:${color1}"></div>
            </div>
            <div class="w-40"></div>
            <div class="flex-1">
              <div class="h-2 rounded-full transition-all" style="width:${pct2.toFixed(1)}%;background:${color2}"></div>
            </div>
          </div>
        </div>`;
    }

    function renderCompare() {
      const t1id = document.getElementById('compare-t1').value;
      const t2id = document.getElementById('compare-t2').value;
      const out = document.getElementById('compare-output');

      if (!t1id || !t2id) { out.innerHTML = '<p class="text-slate-400 text-sm text-center py-12">Select two teams to compare.</p>'; return; }
      if (t1id === t2id) { out.innerHTML = '<p class="text-slate-400 text-sm text-center py-12">Select two different teams.</p>'; return; }

      const r1 = cachedRows.find(r => r.team.id === t1id);
      const r2 = cachedRows.find(r => r.team.id === t2id);
      if (!r1 || !r2) return;

      const m1 = getCompareMetrics(r1);
      const m2 = getCompareMetrics(r2);
      const c1 = r1.team.color;
      const c2 = r2.team.color;

      // Role pcts
      const r1RolePct = k => pct(m1.roles[k], m1.teamTotal);
      const r2RolePct = k => pct(m2.roles[k], m2.teamTotal);
      const r1NatPct  = k => pct(m1.nat[k], m1.teamTotal);
      const r2NatPct  = k => pct(m2.nat[k], m2.teamTotal);

      out.innerHTML = `
        <!-- Team headers -->
        <div class="flex items-center mb-6">
          <div class="flex-1 text-center">
            <div class="inline-block w-4 h-4 rounded-full mb-1" style="background:${c1}"></div>
            <div class="font-bold text-white">${r1.team.name}</div>
            <div class="text-xs text-slate-400">${r1.team.owner}</div>
          </div>
          <div class="w-40 text-center text-slate-600 font-bold text-lg">vs</div>
          <div class="flex-1 text-center">
            <div class="inline-block w-4 h-4 rounded-full mb-1" style="background:${c2}"></div>
            <div class="font-bold text-white">${r2.team.name}</div>
            <div class="text-xs text-slate-400">${r2.team.owner}</div>
          </div>
        </div>

        <!-- Overview -->
        <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-5 mb-5">
          <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Overview</h3>
          ${metricRow('Score', r1.final_score, r2.final_score, c1, c2, x => x.toFixed(2))}
          ${metricRow('Runs', r1.batting_runs, r2.batting_runs, c1, c2, x => x.toFixed(0))}
          ${metricRow('Wickets', r1.bowling_wickets, r2.bowling_wickets, c1, c2, x => x.toFixed(0))}
          ${metricRow('Runs / Match', m1.runsPerMatch, m2.runsPerMatch, c1, c2, x => x.toFixed(1))}
          ${metricRow('Wickets / Match', m1.wicketsPerMatch, m2.wicketsPerMatch, c1, c2, x => x.toFixed(2))}
          ${metricRow('Squad Used', m1.contributors, m2.contributors, c1, c2, x => `${x} / ${m1.contributors === x ? m1.totalSquad : m2.totalSquad}`)}
        </div>

        <!-- Top Performers -->
        <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-5 mb-5">
          <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Top Performers</h3>
          <div class="flex items-start gap-4">
            <!-- Team 1 -->
            <div class="flex-1 space-y-3">
              <div class="rounded-lg p-3 bg-slate-900/60 border-l-2" style="border-color:${c1}">
                <div class="text-xs text-slate-500 mb-0.5">Top Batter</div>
                <div class="font-semibold text-white text-sm">${m1.topBatter?.name || '—'}</div>
                <div class="text-xs" style="color:${c1}">${m1.topBatter?.adj_batting > 0 ? m1.topBatter.adj_batting.toFixed(0) + ' runs' : 'No data'}</div>
              </div>
              <div class="rounded-lg p-3 bg-slate-900/60 border-l-2" style="border-color:${c1}">
                <div class="text-xs text-slate-500 mb-0.5">Top Bowler</div>
                <div class="font-semibold text-white text-sm">${m1.topBowler?.name || '—'}</div>
                <div class="text-xs" style="color:${c1}">${m1.topBowler?.adj_bowling > 0 ? m1.topBowler.adj_bowling.toFixed(0) + ' wickets' : 'No data'}</div>
              </div>
            </div>
            <!-- Divider -->
            <div class="w-px bg-slate-700 self-stretch mx-1"></div>
            <!-- Team 2 -->
            <div class="flex-1 space-y-3">
              <div class="rounded-lg p-3 bg-slate-900/60 border-l-2" style="border-color:${c2}">
                <div class="text-xs text-slate-500 mb-0.5">Top Batter</div>
                <div class="font-semibold text-white text-sm">${m2.topBatter?.name || '—'}</div>
                <div class="text-xs" style="color:${c2}">${m2.topBatter?.adj_batting > 0 ? m2.topBatter.adj_batting.toFixed(0) + ' runs' : 'No data'}</div>
              </div>
              <div class="rounded-lg p-3 bg-slate-900/60 border-l-2" style="border-color:${c2}">
                <div class="text-xs text-slate-500 mb-0.5">Top Bowler</div>
                <div class="font-semibold text-white text-sm">${m2.topBowler?.name || '—'}</div>
                <div class="text-xs" style="color:${c2}">${m2.topBowler?.adj_bowling > 0 ? m2.topBowler.adj_bowling.toFixed(0) + ' wickets' : 'No data'}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Role Breakdown -->
        <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-5 mb-5">
          <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Role Breakdown <span class="text-slate-600 font-normal normal-case">% of team score</span></h3>
          ${pctBar('Batsmen', r1RolePct('Batsmen'), r2RolePct('Batsmen'), c1, c2)}
          ${pctBar('All-Rounders', r1RolePct('All-Rounders'), r2RolePct('All-Rounders'), c1, c2)}
          ${pctBar('Bowlers', r1RolePct('Bowlers'), r2RolePct('Bowlers'), c1, c2)}
        </div>

        <!-- Nationality Split -->
        <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-5">
          <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Nationality Split <span class="text-slate-600 font-normal normal-case">% of team score</span></h3>
          ${pctBar('India', r1NatPct('India'), r2NatPct('India'), c1, c2)}
          ${pctBar('Overseas', r1NatPct('Overseas'), r2NatPct('Overseas'), c1, c2)}
        </div>
      `;
    }

    // ──────────────────────────────────────────────
    // Scoring helpers
    // ──────────────────────────────────────────────
    function calcBattingRuns(batting) {
      if (!batting || (!batting.runs && batting.runs !== 0)) return 0;
      return batting.runs;
    }

    function calcBowlingWickets(bowling) {
      if (!bowling || (!bowling.wickets && bowling.wickets !== 0)) return 0;
      return bowling.wickets;
    }

    // ──────────────────────────────────────────────
    // Build player → team lookup
    // ──────────────────────────────────────────────
    function buildPlayerMap(teams) {
      const map = {};
      for (const team of teams) {
        for (const player of team.players) {
          map[player.name.toLowerCase()] = team.id;
        }
      }
      return map;
    }

    // ──────────────────────────────────────────────
    // Display role: WK counts as Batsman
    // ──────────────────────────────────────────────
    function displayRole(role) {
      if (role === 'Wicket-Keeper') return 'Batsman (WK)';
      return role;
    }

    // ──────────────────────────────────────────────
    // Compute stats
    // ──────────────────────────────────────────────
    function computeStats(teams, matches, bonuses) {
      // Init per-team accumulators
      const stats = {};
      for (const t of teams) {
        // pre-populate all squad members so they appear even with 0 stats
        const playerMap = {};
        for (const p of t.players) {
          playerMap[p.name.toLowerCase()] = { name: p.name, role: p.role, nationality: p.nationality || 'India', uncapped: p.uncapped || false, batting: 0, bowling: 0, runs: 0, balls: 0, runs_conceded: 0, overs: 0, match_ids: new Set() };
        }
        stats[t.id] = {
          team: t,
          matches: new Set(),
          batting_runs: 0,
          bowling_wickets: 0,
          player_map: playerMap   // keyed by lowercase name
        };
      }

      const globalPlayerMap = buildPlayerMap(teams);

      // Accumulate raw per-player values across all matches
      for (const match of matches) {
        for (const perf of (match.performances || [])) {
          const playerKey = perf.player_name.toLowerCase();
          const teamId = globalPlayerMap[playerKey];
          if (!teamId) continue;

          const s = stats[teamId];
          s.matches.add(match.id);

          const battingRuns = calcBattingRuns(perf.batting);
          const bowlingWickets = calcBowlingWickets(perf.bowling);

          // Any player may contribute batting or bowling regardless of their role
          if (!s.player_map[playerKey]) {
            s.player_map[playerKey] = { name: perf.player_name, role: 'Unknown', batting: 0, bowling: 0, runs: 0, balls: 0, runs_conceded: 0, overs: 0, match_ids: new Set() };
          }
          const pm = s.player_map[playerKey];
          pm.match_ids.add(match.id);
          pm.batting += battingRuns;
          pm.bowling += bowlingWickets;
          if (perf.batting) {
            pm.runs += perf.batting.runs || 0;
            pm.balls += perf.batting.balls || 0;
          }
          if (perf.bowling) {
            pm.runs_conceded += perf.bowling.runs_conceded || 0;
            pm.overs += perf.bowling.overs || 0;
          }
        }
      }

      // Sum team totals (multipliers and bonuses applied manually at end of season)
      for (const t of teams) {
        const s = stats[t.id];
        let totalBatting = 0;
        let totalBowling = 0;

        for (const p of Object.values(s.player_map)) {
          p.adj_batting = p.batting;
          p.adj_bowling = p.bowling;
          totalBatting += p.adj_batting;
          totalBowling += p.adj_bowling;
        }

        s.batting_runs = totalBatting;
        s.bowling_wickets = totalBowling;
      }

      // Compute team percentages and player contribution percentages
      const totalRuns = Object.values(stats).reduce((a, s) => a + s.batting_runs, 0);
      const totalWickets = Object.values(stats).reduce((a, s) => a + s.bowling_wickets, 0);

      for (const s of Object.values(stats)) {
        s.run_pct = totalRuns > 0 ? (s.batting_runs / totalRuns) * 100 : 0;
        s.wicket_pct = totalWickets > 0 ? (s.bowling_wickets / totalWickets) * 100 : 0;
        s.final_score = s.run_pct + s.wicket_pct;
        s.match_count = s.matches.size;

        // Role group order: Batsman/WK = 0, All-Rounder = 1, Bowler = 2
        function roleGroup(role) {
          if (role === 'Batsman' || role === 'Wicket-Keeper') return 0;
          if (role === 'All-Rounder') return 1;
          return 2;
        }

        s.players_sorted = Object.values(s.player_map)
          .map(p => ({
            ...p,
            run_pct: s.batting_runs > 0 ? (p.adj_batting / s.batting_runs) * 100 : 0,
            wicket_pct: s.bowling_wickets > 0 ? (p.adj_bowling / s.bowling_wickets) * 100 : 0,
            contribution: (totalRuns > 0 ? (p.adj_batting / totalRuns) * 100 : 0)
                        + (totalWickets > 0 ? (p.adj_bowling / totalWickets) * 100 : 0)
          }))
          .sort((a, b) => {
            const gDiff = roleGroup(a.role) - roleGroup(b.role);
            return gDiff !== 0 ? gDiff : b.contribution - a.contribution;
          });
      }

      return Object.values(stats).sort((a, b) => b.final_score - a.final_score);
    }

    // ──────────────────────────────────────────────
    // Render player sub-table for a team
    // ──────────────────────────────────────────────
    function buildPlayerHTML(row) {
      const { players_sorted, team } = row;
      const colorBorder = `border-l-4` ;

      const playerRows = players_sorted.map((p, i) => {
        const hasStats = p.adj_batting > 0 || p.adj_bowling > 0;
        const sr = p.balls > 0 ? ((p.runs / p.balls) * 100).toFixed(1) : '—';
        const eco = p.overs > 0 ? (p.runs_conceded / p.overs).toFixed(2) : '—';
        const planeIcon = p.nationality === 'Overseas'
          ? ' <span style="display:inline-block;transform:rotate(-45deg);font-size:15px;color:#F59E0B" title="Overseas">✈</span>'
          : '';
        const uncappedBadge = p.uncapped
          ? ' <span class="text-xs text-amber-400 font-semibold">(U)</span>'
          : '';
        return `
          <tr class="${hasStats ? '' : 'opacity-40'} border-b border-slate-700/30">
            <td class="px-3 py-2 text-slate-400 text-xs w-8">${i + 1}</td>
            <td class="px-3 py-2">
              <div class="font-semibold text-white text-sm tracking-wide">${p.name}${uncappedBadge}${planeIcon}</div>
            </td>
            <td class="px-3 py-2">
              <span class="text-xs px-2 py-0.5 rounded-full bg-slate-700 text-slate-300">${displayRole(p.role)}</span>
            </td>
            <td class="px-3 py-2 text-center score-badge text-blue-300 text-sm">${p.adj_batting > 0 ? p.adj_batting.toFixed(2) : '—'}</td>
            <td class="px-3 py-2 text-center score-badge text-slate-400 text-sm">${sr}</td>
            <td class="px-3 py-2 text-center score-badge text-purple-300 text-sm">${p.adj_bowling > 0 ? p.adj_bowling.toFixed(2) : '—'}</td>
            <td class="px-3 py-2 text-center score-badge text-slate-400 text-sm">${eco}</td>
            <td class="px-3 py-2 text-center score-badge text-slate-300 text-sm font-semibold">${p.contribution.toFixed(2)}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="border-l-4 mx-2 mb-2 rounded-r-lg overflow-hidden bg-slate-900/60" style="border-color: ${team.color}">
          <table class="w-full text-xs">
            <thead>
              <tr class="bg-slate-800/80 text-slate-500 uppercase tracking-wider">
                <th class="px-3 py-2 text-center w-8">#</th>
                <th class="px-3 py-2 text-left">Player</th>
                <th class="px-3 py-2 text-left">Role</th>
                <th class="px-3 py-2 text-center">Runs</th>
                <th class="px-3 py-2 text-center">SR</th>
                <th class="px-3 py-2 text-center">Wickets</th>
                <th class="px-3 py-2 text-center">Eco</th>
                <th class="px-3 py-2 text-center">Score</th>
              </tr>
            </thead>
            <tbody>${playerRows}</tbody>
          </table>
        </div>
      `;
    }

    // ──────────────────────────────────────────────
    // Render table
    // ──────────────────────────────────────────────
    function renderTable(rows) {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      // Sort
      const { col, dir } = sortState;
      const sorted = [...rows].sort((a, b) => {
        const av = col === 'name' ? a.team.name : a[col];
        const bv = col === 'name' ? b.team.name : b[col];
        if (typeof av === 'string') return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
        return dir === 'asc' ? av - bv : bv - av;
      });
      rows = sorted;

      // Update header sort icons
      document.querySelectorAll('[data-col]').forEach(th => {
        const icon = th.querySelector('.sort-icon');
        if (th.dataset.col === col) {
          icon.textContent = dir === 'asc' ? '↑' : '↓';
          th.classList.add('text-slate-200');
        } else {
          icon.textContent = '';
          th.classList.remove('text-slate-200');
        }
      });

      const leaderId = cachedRows.length ? cachedRows.reduce((best, r) => r.final_score > best.final_score ? r : best).team.id : null;

      rows.forEach((row, idx) => {
        const rank = idx + 1;
        const { team, match_count, batting_runs, bowling_wickets, run_pct, wicket_pct, final_score } = row;
        const isFirst = rank === 1;
        const isLeader = team.id === leaderId && final_score > 0;
        const expandId = `expand-${team.id}`;
        const chevronId = `chevron-${team.id}`;

        // Team summary row
        const tr = document.createElement('tr');
        tr.className = `team-row ${isFirst ? 'bg-slate-700/40' : 'bg-slate-800/30'} hover:bg-slate-700/30 transition-colors`;
        tr.setAttribute('data-expand', expandId);
        tr.setAttribute('data-chevron', chevronId);

        tr.innerHTML = `
          <td class="px-4 py-3 text-center font-bold text-slate-300">${rank}</td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-3">
              <span class="chevron text-slate-500 text-xs" id="${chevronId}">▶</span>
              <span class="w-3 h-3 rounded-full flex-shrink-0" style="background-color: ${team.color}"></span>
              <div>
                <div class="font-semibold text-white">${team.name}</div>
                <div class="text-xs text-slate-400">${team.owner}</div>
              </div>
              ${isLeader ? '<span class="ml-2 text-yellow-400 text-xs font-bold bg-yellow-400/10 px-2 py-0.5 rounded-full">LEADER</span>' : ''}
            </div>
          </td>
          <td class="px-4 py-3 text-center text-slate-300">${match_count}</td>
          <td class="px-4 py-3 text-center score-badge text-blue-300">${batting_runs.toFixed(2)}</td>
          <td class="px-4 py-3 text-center score-badge text-purple-300">${bowling_wickets.toFixed(2)}</td>
          <td class="px-4 py-3 text-center score-badge text-emerald-300">${run_pct.toFixed(2)}%</td>
          <td class="px-4 py-3 text-center score-badge text-orange-300">${wicket_pct.toFixed(2)}%</td>
          <td class="px-4 py-3 text-center">
            <span class="font-bold text-lg score-badge ${isLeader ? 'text-yellow-300' : 'text-white'}">${final_score.toFixed(2)}</span>
          </td>
        `;

        // Player breakdown row (hidden by default)
        const expandTr = document.createElement('tr');
        expandTr.className = 'player-row';
        expandTr.id = expandId;
        expandTr.innerHTML = `<td colspan="8" class="p-0">${buildPlayerHTML(row)}</td>`;

        tr.addEventListener('click', () => {
          const isOpen = expandTr.classList.contains('open');
          expandTr.classList.toggle('open');
          const chevron = document.getElementById(chevronId);
          chevron.classList.toggle('open', !isOpen);
        });

        tbody.appendChild(tr);
        tbody.appendChild(expandTr);
      });
    }

    // ──────────────────────────────────────────────
    // Render season stats (totals)
    // ──────────────────────────────────────────────
    function renderSeasonStats(rows) {
      const totalRuns = rows.reduce((a, r) => a + r.batting_runs, 0);
      const totalWickets = rows.reduce((a, r) => a + r.bowling_wickets, 0);
      const stats = [
        { label: 'Total Runs', icon: '🏏', value: Math.round(totalRuns), desc: 'Across all fantasy squads', color: 'border-blue-500/40 bg-blue-950/30' },
        { label: 'Total Wickets', icon: '🎳', value: totalWickets % 1 === 0 ? totalWickets : totalWickets.toFixed(2), desc: 'Across all fantasy squads', color: 'border-teal-500/40 bg-teal-950/30' }
      ];
      document.getElementById('season-stats').innerHTML = stats.map(s => `
        <div class="border rounded-xl p-4 ${s.color}">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xl">${s.icon}</span>
            <span class="font-semibold text-slate-200">${s.label}</span>
          </div>
          <p class="text-xs text-slate-400 mb-2">${s.desc}</p>
          <p class="font-bold text-lg text-white">${s.value}</p>
        </div>
      `).join('');
    }

    // ──────────────────────────────────────────────
    // Render season awards (leaderboards + bonuses)
    // ──────────────────────────────────────────────
    function renderAwards(bonuses, rows) {
      const container = document.getElementById('bonuses-container');

      // Flatten all players across all teams
      const allPlayers = [];
      const totalRuns = rows.reduce((a, r) => a + r.batting_runs, 0);
      const totalWickets = rows.reduce((a, r) => a + r.bowling_wickets, 0);
      for (const row of rows) {
        for (const p of Object.values(row.player_map)) {
          p._teamColor = row.team.color;
          p._teamName = row.team.name;
          p.match_count = p.match_ids.size;
          const contribScore = (totalRuns > 0 ? (p.batting / totalRuns) * 100 : 0)
                             + (totalWickets > 0 ? (p.bowling / totalWickets) * 100 : 0);
          p.impact_per_match = contribScore;
          p.strike_rate = p.balls >= 10 ? (p.runs / p.balls) * 100 : null;
          p.economy = p.overs >= 2 ? p.runs_conceded / p.overs : null;
          allPlayers.push(p);
        }
      }

      function leaderboardHTML(players, colLabel, limit = 5) {
        const top = players.slice(0, limit);
        if (!top.length) return `<p class="text-slate-600 text-sm">No data yet</p>`;
        const header = `<li class="flex items-center gap-2 text-xs text-slate-500 pb-1 border-b border-slate-700/60 mb-1">
          <span class="w-5 shrink-0"></span>
          <span class="flex-1">Player</span>
          <span class="font-mono shrink-0">${colLabel}</span>
        </li>`;
        const rows = top.map((p, i) => {
          const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
          const nameStyle = p._teamColor ? `style="color:${p._teamColor}"` : '';
          return `<li class="flex items-center gap-2 text-sm">
            <span class="text-slate-500 w-5 shrink-0 text-center">${rank}</span>
            <span class="flex-1 truncate font-medium" ${nameStyle} title="${p._teamName || ''}">${p.name}</span>
            <span class="font-mono text-slate-300 shrink-0">${p._statVal}</span>
          </li>`;
        }).join('');
        return `<ul class="space-y-1.5">${header}${rows}</ul>`;
      }

      function card(icon, label, desc, color, innerHtml) {
        return `<div class="border rounded-xl p-4 ${color}">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xl">${icon}</span>
            <span class="font-semibold text-slate-200">${label}</span>
          </div>
          <p class="text-xs text-slate-400 mb-3">${desc}</p>
          ${innerHtml}
        </div>`;
      }

      // Orange Cap — top 5 by runs
      const orangeList = allPlayers
        .filter(p => p.runs > 0)
        .sort((a, b) => b.runs - a.runs)
        .map(p => ({ ...p, _statVal: p.runs }));
      const orangeCapFinal = bonuses.orange_cap_holder;

      // Purple Cap — top 5 by wickets
      const purpleList = allPlayers
        .filter(p => p.bowling > 0)
        .sort((a, b) => b.bowling - a.bowling)
        .map(p => ({ ...p, _statVal: p.bowling }));
      const purpleCapFinal = bonuses.purple_cap_holder;

      // Most Explosive — top 5 by strike rate (min 10 balls)
      const explosiveList = allPlayers
        .filter(p => p.strike_rate !== null)
        .sort((a, b) => b.strike_rate - a.strike_rate)
        .map(p => ({ ...p, _statVal: p.strike_rate.toFixed(1) }));

      // Most Clinical — top 5 lowest economy (min 2 overs)
      const clinicalList = allPlayers
        .filter(p => p.economy !== null)
        .sort((a, b) => a.economy - b.economy)
        .map(p => ({ ...p, _statVal: p.economy.toFixed(2) }));

      // Highest Impact — top 5 by total contribution percentage
      const impactList = allPlayers
        .filter(p => p.batting > 0 || p.bowling > 0)
        .sort((a, b) => b.impact_per_match - a.impact_per_match)
        .map(p => ({ ...p, _statVal: p.impact_per_match.toFixed(2) + '%' }));

      function capCard(icon, label, desc, color, finalHolder, list, colLabel) {
        const banner = finalHolder
          ? `<p class="font-bold text-lg text-white mb-3">${finalHolder} <span class="text-xs text-slate-400 font-normal">(official)</span></p>`
          : `<p class="text-xs text-slate-500 mb-2 italic">Official winner announced end of season</p>`;
        return card(icon, label, desc, color, banner + leaderboardHTML(list, colLabel));
      }

      container.innerHTML = [
        capCard('🟠', 'Orange Cap', 'Most runs — our players', 'border-orange-500/40 bg-orange-950/30', orangeCapFinal, orangeList, 'Runs'),
        capCard('🟣', 'Purple Cap', 'Most wickets — our players', 'border-purple-500/40 bg-purple-950/30', purpleCapFinal, purpleList, 'Wkts'),
        card('⭐', 'MVP', 'Most Valuable Player', 'border-yellow-500/40 bg-yellow-950/30',
          `<p class="font-bold text-lg text-slate-600">TBD — End of Season</p>`),
        card('💥', 'Most Explosive', 'Highest strike rate (min 10 balls)', 'border-red-500/40 bg-red-950/30',
          leaderboardHTML(explosiveList, 'SR')),
        card('🎯', 'Most Clinical', 'Lowest economy (min 2 overs)', 'border-cyan-500/40 bg-cyan-950/30',
          leaderboardHTML(clinicalList, 'Economy')),
        card('⚡', 'Highest Impact', '% of total runs + wickets contributed', 'border-emerald-500/40 bg-emerald-950/30',
          leaderboardHTML(impactList, '%')),
      ].join('');
    }

    // ──────────────────────────────────────────────
    // Render upcoming match
    // ──────────────────────────────────────────────
    function renderUpcomingMatch(upcomingMatches, teams) {
      const container = document.getElementById('upcoming-match');
      if (!upcomingMatches || upcomingMatches.length === 0) return;

      function iplSquadRows(iplTeamName) {
        return teams.flatMap(t =>
          t.players
            .filter(p => p.ipl_team === iplTeamName)
            .map(p => `<div class="flex items-center gap-2 text-sm">
          <span class="w-1.5 h-1.5 rounded-full shrink-0" style="background:${t.color}"></span>
          <span class="font-medium" style="color:${t.color}">${p.name}</span>
          <span class="text-slate-600 text-xs truncate">· ${t.name}</span>
        </div>`)
        ).join('');
      }

      const uniqueDates = new Set(upcomingMatches.map(m => m.date));
      const isDoubleHeader = uniqueDates.size === 1 && upcomingMatches.length > 1;

      container.innerHTML = upcomingMatches.map((upcoming, i) => {
        const squad1Rows = iplSquadRows(upcoming.ipl_team1);
        const squad2Rows = iplSquadRows(upcoming.ipl_team2);
        const d = new Date(upcoming.date + 'T00:00:00');
        const dateStr = d.toLocaleDateString('en-IN', { dateStyle: 'medium' });
        const idx = i;
        const badge = isDoubleHeader
          ? `<span class="text-[10px] font-bold uppercase tracking-widest text-amber-400 bg-amber-500/15 px-2 py-0.5 rounded">Double Header</span>`
          : `<span class="text-[10px] font-bold uppercase tracking-widest text-indigo-400 bg-indigo-500/15 px-2 py-0.5 rounded">Next Up</span>`;
        return `
        <div class="border border-slate-700 bg-slate-800/40 rounded-xl overflow-hidden mb-4">
          <button class="upcoming-toggle w-full flex items-center justify-between px-4 py-2.5 border-b border-slate-700 bg-slate-800/60 hover:bg-slate-800 transition-colors" data-idx="${idx}">
            <div class="flex items-center gap-2.5">
              <span class="upcoming-chevron text-slate-500 transition-transform">▾</span>
              ${badge}
              <span class="font-semibold text-slate-100 text-sm">${upcoming.ipl_team1} <span class="text-slate-500 font-normal">vs</span> ${upcoming.ipl_team2}</span>
            </div>
            <span class="text-xs text-slate-500">${dateStr}</span>
          </button>
          <div class="upcoming-body grid grid-cols-2 divide-x divide-slate-700/60">
            <div class="px-4 py-3">
              <p class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-2">${upcoming.ipl_team1}</p>
              <div class="space-y-1.5">${squad1Rows || '<span class="text-slate-600 text-xs">None of our players</span>'}</div>
            </div>
            <div class="px-4 py-3">
              <p class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-2">${upcoming.ipl_team2}</p>
              <div class="space-y-1.5">${squad2Rows || '<span class="text-slate-600 text-xs">None of our players</span>'}</div>
            </div>
          </div>
        </div>`;
      }).join('');

      container.querySelectorAll('.upcoming-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const body = btn.nextElementSibling;
          const chevron = btn.querySelector('.upcoming-chevron');
          const collapsed = body.style.display === 'none';
          body.style.display = collapsed ? '' : 'none';
          chevron.style.transform = collapsed ? '' : 'rotate(-90deg)';
        });
      });
    }

    // ──────────────────────────────────────────────
    // Render match log
    // ──────────────────────────────────────────────
    function renderMatchLog(matches) {
      const container = document.getElementById('match-log');
      const noMatches = document.getElementById('no-matches');

      if (!matches || matches.length === 0) {
        noMatches.classList.remove('hidden');
        return;
      }

      noMatches.classList.add('hidden');
      container.innerHTML = [...matches].reverse().sort((a, b) => b.date.localeCompare(a.date)).map(m => `
        <div class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 flex flex-wrap items-center gap-4">
          <span class="text-xs text-slate-500 font-mono">${m.id}</span>
          <span class="font-semibold text-slate-200">${m.ipl_team1} vs ${m.ipl_team2}</span>
          <span class="text-slate-400 text-sm">${m.date}</span>
          <span class="text-green-400 text-sm ml-auto">${m.result || ''}</span>
          <span class="text-xs text-slate-500">${(m.performances || []).length} perf. entries</span>
        </div>
      `).join('');
    }

    // ──────────────────────────────────────────────
    // Next-update countdown
    // Cron fires at 14:00 UTC (7:30 PM IST) and 19:00 UTC (12:30 AM IST)
    // ──────────────────────────────────────────────
    let countdownInterval = null;

    function nextCronTime() {
      const now = Date.now();
      const d = new Date(now);
      const base = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      const candidates = [base + 14 * 3600000, base + 19 * 3600000, base + 38 * 3600000];
      return candidates.find(t => t > now) ?? candidates[2];
    }

    function formatCountdown(ms) {
      const total = Math.floor(ms / 1000);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function startNextUpdateCountdown() {
      const ids = ['points-table-next-update', 'match-log-next-update'];
      function tick() {
        const diff = nextCronTime() - Date.now();
        const label = diff <= 0 ? '· updating soon' : `· next update in ${formatCountdown(diff)}`;
        ids.forEach(id => { document.getElementById(id).textContent = label; });
      }
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    // ──────────────────────────────────────────────
    // Main
    // ──────────────────────────────────────────────
    async function init() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const tableContainer = document.getElementById('table-container');

      try {
        const [teamsRes, matchesRes] = await Promise.all([
          fetch('/data/teams.json'),
          fetch('/data/matches.json')
        ]);

        if (!teamsRes.ok) throw new Error(`teams.json: ${teamsRes.status}`);
        if (!matchesRes.ok) throw new Error(`matches.json: ${matchesRes.status}`);

        const teamsData = await teamsRes.json();
        const matchesData = await matchesRes.json();

        const lastMatchDate = matchesData.matches.map(m => m.date).sort().at(-1);
        if (lastMatchDate) {
          const d = new Date(lastMatchDate + 'T00:00:00');
          const label = 'Last updated ' + d.toLocaleDateString('en-IN', { dateStyle: 'medium' });
          document.getElementById('points-table-updated').textContent = label;
          document.getElementById('match-log-updated').textContent = label;
        }

        const rows = computeStats(
          teamsData.teams,
          matchesData.matches,
          matchesData.season_bonuses
        );

        loadingEl.classList.add('hidden');
        tableContainer.classList.remove('hidden');

        cachedRows = rows;
        cachedTeams = teamsData.teams;

        // Populate compare dropdowns
        const opts = teamsData.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        document.getElementById('compare-t1').innerHTML = '<option value="">Select Team 1</option>' + opts;
        document.getElementById('compare-t2').innerHTML = '<option value="">Select Team 2</option>' + opts;
        document.getElementById('compare-t1').addEventListener('change', renderCompare);
        document.getElementById('compare-t2').addEventListener('change', renderCompare);

        // Wire up column header sorting
        document.querySelectorAll('[data-col]').forEach(th => {
          th.addEventListener('click', () => {
            const col = th.dataset.col;
            sortState = sortState.col === col
              ? { col, dir: sortState.dir === 'desc' ? 'asc' : 'desc' }
              : { col, dir: 'desc' };
            renderTable(cachedRows);
          });
        });

        renderTable(rows);
        renderSeasonStats(rows);
        renderAwards(matchesData.season_bonuses, rows);
        renderUpcomingMatch(matchesData.upcoming_matches, teamsData.teams);
        renderMatchLog(matchesData.matches);

        if (matchesData.upcoming_matches && matchesData.upcoming_matches.length > 0) {
          startNextUpdateCountdown();
        }

      } catch (err) {
        loadingEl.classList.add('hidden');
        errorEl.textContent = `Failed to load data: ${err.message}`;
        errorEl.classList.remove('hidden');
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
